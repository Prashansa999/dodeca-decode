# fly.toml — deploy Dodeca Decode to Fly.io
# Usage: fly launch (first time) then `fly deploy`

app = "dodeca-decode"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
